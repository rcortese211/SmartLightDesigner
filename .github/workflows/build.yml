name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Swift Build (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build 2>&1

      - name: Check for warnings
        run: swift build 2>&1 | grep -E "warning:|error:" | head -50 || true
