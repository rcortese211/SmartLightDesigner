name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Swift Build (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: |
          swift build 2>&1 | tee /tmp/build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Show errors and warnings
        if: always()
        run: grep -E "warning:|error:" /tmp/build_output.txt | head -100 || true
